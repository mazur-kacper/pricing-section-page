<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="navbar">
      <div class="logo">ProVPN</div>
      <div class="right-links">
        <a href="">About</a><a href="">Plans</a><a href="">Contact</a>
      </div>
    </div>
    <div class="pricing-section">
      <h1>Our plans</h1>
      <p>Please choose a plan to become a member.</p>
      <div class="cards-container">
        <div class="card">
          <h1>Basic</h1>
          <p class="price">$9/mo</p>
          <p>1 user</p>
          <p>Email support</p>
          <button>Select</button>
        </div>
        <div class="card">
          <h1>Pro</h1>
          <p class="price">$19/mo</p>
          <p>5 users</p>
          <p>Priority support</p>
          <button>Select</button>
        </div>
        <div class="card">
          <h1>Premium</h1>
          <p class="price">$39/mo</p>
          <p>Unlimited users</p>
          <p>24/7 support</p>
          <button>Select</button>
        </div>
      </div>
    </div>
    <div class="footer">
      <div class="site-name">ProVPN</div>
      <div class="links">
        <a href="">About</a><a href="">Contact</a><a href="">Support</a>
      </div>
      <div class="copyright">© 2026 ProVPN</div>
    </div>
  </body>
</html>
